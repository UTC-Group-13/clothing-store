name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'ec/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
    paths:
      - 'ec/**'

env:
  DOCKER_IMAGE_NAME: clothing-store-api
  DOCKER_REGISTRY: ghcr.io
  JAVA_VERSION: '21'

jobs:
  # Job 1: Test and Build
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run tests
        working-directory: ./ec
        run: mvn test -B
        continue-on-error: true

      - name: Build application
        working-directory: ./ec
        run: mvn clean package -DskipTests -B

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar-file
          path: ec/target/*.jar
          retention-days: 1

  # Job 2: Build and Push Docker Image
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase owner
        id: vars
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ steps.vars.outputs.owner }}/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./ec
          file: ./ec/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # Job 3: Deploy to Server
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase owner
        id: vars
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: 22
          # Tang timeout len 10 phut de du cho container khoi dong
          command_timeout: 600s
          script: |
            IMAGE_NAME="ghcr.io/${{ steps.vars.outputs.owner }}/clothing-store-api:latest"
            CONTAINER_NAME="clothing-store-api"

            echo "=== [1/4] Login to GHCR ==="
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "=== [2/4] Pull latest image ==="
            docker pull $IMAGE_NAME

            echo "=== [3/4] Stop & remove old container ==="
            docker stop $CONTAINER_NAME 2>/dev/null || true
            docker rm   $CONTAINER_NAME 2>/dev/null || true

            echo "=== [4/4] Start new container ==="
            mkdir -p /home/clothing-store/uploads/images
            mkdir -p /home/clothing-store/logs

            docker run -d \
              --name $CONTAINER_NAME \
              --restart unless-stopped \
              -p 8080:8080 \
              -e SPRING_DATASOURCE_URL="${{ secrets.DB_URL }}" \
              -e SPRING_DATASOURCE_USERNAME="${{ secrets.DB_USERNAME }}" \
              -e SPRING_DATASOURCE_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e JWT_EXPIRATION="${{ secrets.JWT_EXPIRATION || '86400000' }}" \
              -e FILE_UPLOAD_DIR="/app/uploads/images" \
              -v /home/clothing-store/uploads:/app/uploads \
              -v /home/clothing-store/logs:/app/logs \
              $IMAGE_NAME

            echo "=== Wait for healthy (max 300s) ==="
            for i in $(seq 1 30); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' $CONTAINER_NAME 2>/dev/null || echo "error")
              echo "Waiting for container to be healthy... ($i/30) [status: $STATUS]"

              if [ "$STATUS" = "healthy" ]; then
                echo "✅ Container is healthy!"
                break
              fi

              # Phat hien unhealthy som → in log va dung ngay
              if [ "$STATUS" = "unhealthy" ]; then
                echo "❌ Container unhealthy! Last 80 lines:"
                docker logs --tail 80 $CONTAINER_NAME
                exit 1
              fi

              if [ "$i" -eq 30 ]; then
                echo "❌ Timeout. Container logs:"
                docker logs --tail 80 $CONTAINER_NAME
                exit 1
              fi

              sleep 10
            done

            docker image prune -af --filter "until=24h"
            echo "✅ Deployment successful!"
            docker ps | grep $CONTAINER_NAME
