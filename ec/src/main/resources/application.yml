spring:
  application:
    name: ec

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://160.30.113.40:3307/clothing_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: false
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:loc7102010@gmail.com}
    password: ${MAIL_PASSWORD:test123456}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false
    default-encoding: UTF-8
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

jwt:
  secret: ${JWT_SECRET:3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b}
  expiration: ${JWT_EXPIRATION:86400000}

# ============================================================
# Cấu hình upload file ảnh
# ============================================================
file:
  upload:
    dir: ${FILE_UPLOAD_DIR:C:\CODE\uploads\images}      # Thu muc luu file tren disk
    url-prefix: C:\CODE\uploads\images                # Prefix URL de FE truy cap anh

# ============================================================
# AI Chatbot Configuration
# ============================================================
ai:
  # Provider: "github" (dung GitHub Models - mien phi) | "claude" (can credits)
  provider: ${AI_PROVIDER:github}
  api:
    key: ${AI_API_KEY:test}   # GitHub PAT token
    model: ${AI_MODEL:gpt-4o-mini}                                   # gpt-4o-mini: 150 req/day mien phi
    max-tokens: ${AI_MAX_TOKENS:1024}

# Giu lai Claude config de co the switch bang env var
claude:
  api:
    key: ${CLAUDE_API_KEY:}                                          # Khong set key mac dinh de tranh loi credits
    model: ${CLAUDE_MODEL:claude-3-haiku-20240307}
    max-tokens: ${CLAUDE_MAX_TOKENS:1024}

app:
  mail:
    from: ${MAIL_USERNAME:your-email@gmail.com}
    from-name: "Clothing Store"

